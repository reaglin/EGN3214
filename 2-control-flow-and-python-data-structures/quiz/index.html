  var QUIZ_DATA = {"ModuleFolderName":"Control_Flow_and","CourseName":"Egn3214","LastModified":"2026-05-16T15:11:07.9802982-04:00","NextQuestionNumber":11,"Questions":[{"Id":"TEMP_001","Type":"MC","Title":"Purpose of elif clause in Python","QuestionText":"What is the primary purpose of the elif clause in Python conditional statements?","Hint":"Think about what happens after an initial if condition fails.","Feedback":"The elif clause allows checking multiple conditions in sequence after an initial if condition fails. Python evaluates them top to bottom and executes only the first block whose condition is True.","TopicTitle":"Conditional Statements","GeneratedDate":"2026-05-16T15:11:07.9798793-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"To check additional conditions in sequence after an initial if condition fails","OptionFeedback":""},{"Weight":0,"Text":"To define a default block that always executes at the end","OptionFeedback":""},{"Weight":0,"Text":"To repeat a block of code while a condition is True","OptionFeedback":""},{"Weight":0,"Text":"To exit a loop when a condition is met","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_002","Type":"MC","Title":"Common beginner error with if statements","QuestionText":"Which of the following is described as one of the most common beginner errors when writing if statements in Python?","Hint":"Python uses whitespace to define code blocks.","Feedback":"Python uses indentation (whitespace) to define code blocks. A missing or incorrect indent is one of the most common beginner errors when writing if statements.","TopicTitle":"Conditional Statements","GeneratedDate":"2026-05-16T15:11:07.9799323-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches" ,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"for loop","OptionFeedback":""},{"Weight":0,"Text":"while loop","OptionFeedback":""},{"Weight":0,"Text":"do-while loop","OptionFeedback":""},{"Weight":0,"Text":"Either loop type is equally preferred","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_005","Type":"MC","Title":"Behavior of break in nested loops","QuestionText":"When the break statement is used inside nested loops, which loop does it exit?","Hint":"Consider how break interacts with multiple levels of nesting.","Feedback":"The break statement immediately terminates only the innermost loop in which it appears, transferring control to the first statement after that loop.","TopicTitle":"Conditional Statements","GeneratedDate":"2026-05-16T15:11:07.9799343-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"Only the innermost loop","OptionFeedback":""},{"Weight":0,"Text":"All loops at every nesting level","OptionFeedback":""},{"Weight":0,"Text":"The outermost loop only","OptionFeedback":""},{"Weight":0,"Text":"The loop that contains the condition that became False","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_006","Type":"MC","Title":"Purpose of continue statement in loops","QuestionText":"What does the continue statement do when encountered inside a loop?","Hint":"Think about what happens to the rest of the current iteration.","Feedback":"The continue statement skips the remainder of the current loop iteration and jumps directly to the next iteration\u0027s condition check, without exiting the loop entirely.","TopicTitle":"Conditional Statements","GeneratedDate":"2026-05-16T15:11:07.9799357-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"Skips the rest of the current iteration and moves to the next","OptionFeedback":""},{"Weight":0,"Text":"Immediately terminates the entire loop","OptionFeedback":""},{"Weight":0,"Text":"Restarts the loop from the beginning","OptionFeedback":""},{"Weight":0,"Text":"Pauses the loop until a condition is met","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_007","Type":"MC","Title":"Accessing last element with negative index","QuestionText":"How do you access the last element of a Python list using a negative index?","Hint":"Negative indices count from the end of the list.","Feedback":"In Python, my_list[-1] returns the last element of a list. Negative indices count backwards from the end of the list, which is a common Python idiom.","TopicTitle":"Conditional Statements","GeneratedDate":"2026-05-16T15:11:07.9799363-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"my_list[-1]","OptionFeedback":""},{"Weight":0,"Text":"my_list[last]","OptionFeedback":""},{"Weight":0,"Text":"my_list[0]","OptionFeedback":""},{"Weight":0,"Text":"my_list[-0]","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_008","Type":"MC","Title":"Creating a single-element tuple correctly","QuestionText":"Which of the following correctly creates a single-element tuple in Python?","Hint":"Without a specific punctuation, Python treats parentheses as a grouping operator.","Feedback":"A single-element tuple requires a trailing comma, e.g., my_tuple = (42,). Without the comma, Python interprets the parentheses as a grouping operator and the result is simply the integer 42, not a tuple.","TopicTitle":"Conditional Statements","GeneratedDate":"2026-05-16T15:11:07.9799369-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"my_tuple = (42,)","OptionFeedback":""},{"Weight":0,"Text":"my_tuple = (42)","OptionFeedback":""},{"Weight":0,"Text":"my_tuple = [42]","OptionFeedback":""},{"Weight":0,"Text":"my_tuple = {42}","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_009","Type":"MC","Title":"Dictionary method to avoid KeyError","QuestionText":"Which dictionary method should be used to retrieve a value while avoiding a KeyError if the key does not exist?","Hint":"This method can return None or a specified default value.","Feedback":"The get() method avoids KeyError by returning None or a specified default value when the requested key does not exist in the dictionary, unlike direct square-bracket access.","TopicTitle":"Conditional Statements","GeneratedDate":"2026-05-16T15:11:07.9799374-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"get()","OptionFeedback":""},{"Weight":0,"Text":"keys()","OptionFeedback":""},{"Weight":0,"Text":"pop()","OptionFeedback":""},{"Weight":0,"Text":"items()","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"},{"Id":"TEMP_010","Type":"MC","Title":"Performance advantage of sets over lists","QuestionText":"Why are sets significantly faster than lists for membership testing?","Hint":"Consider the time complexity of the in operator for sets.","Feedback":"Sets provide O(1) average-time membership testing using the in operator, compared to O(n) for lists. For large datasets with frequent lookups, converting a list to a set can provide a substantial performance improvement.","TopicTitle":"Conditional Statements","GeneratedDate":"2026-05-16T15:11:07.9799382-04:00","InitialText":null,"AnswerKey":null,"Answers":null,"Scoring":null,"Choices":null,"Matches":null,"Options":[{"Weight":100,"Text":"Sets provide O(1) average-time membership testing","OptionFeedback":""},{"Weight":0,"Text":"Sets store elements in sorted order for faster searching","OptionFeedback":""},{"Weight":0,"Text":"Sets use binary search to locate elements","OptionFeedback":""},{"Weight":0,"Text":"Sets cache recent lookups to speed up repeated searches","OptionFeedback":""}],"TrueWeight":0,"TrueFeedback":null,"FalseWeight":0,"FalseFeedback":null,"MultiselectOptions":null,"Items":null,"TypeDisplayName":"Multiple Choice","TypeBadge":"MC"}]};
